<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rewear — Secure Checkout</title>
  <link rel="stylesheet" href="checkout-styles.css">
</head>
<body>

  <a href="homepage.html" class="btn-back">← Back to Shopping</a>

  <div class="checkout-container">
    
    <div class="checkout-form-container">
      <h2>Secure Checkout</h2>
      
      <form id="checkout-form">
        <div class="form-section">
          <h3>Shipping Details</h3>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" required placeholder="Jane Doe">
          </div>
          <div class="form-group">
            <label>Address</label>
            <input type="text" required placeholder="123 Sustainable Ave">
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>City</label>
              <input type="text" required placeholder="New York">
            </div>
            <div class="form-group">
              <label>Zip Code</label>
              <input type="text" required placeholder="10001">
            </div>
          </div>
        </div>

        <div class="form-section">
          <h3>Payment Method (Demo Mode)</h3>
           <div class="form-group">
            <label>Cardholder Name</label>
            <input type="text" required placeholder="Jane Doe">
          </div>
          <div class="form-group">
            <label>Card Number</label>
            <input type="text" required placeholder="0000 0000 0000 0000" maxlength="19">
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>Expiry (MM/YY)</label>
              <input type="text" required placeholder="12/25" maxlength="5">
            </div>
            <div class="form-group">
              <label>CVV</label>
              <input type="password" required placeholder="123" maxlength="3">
            </div>
          </div>
        </div>

        <button type="submit" class="btn-pay">Confirm & Pay</button>
        <div class="demo-warning">🔒 This is a simulated environment. No real funds will be processed.</div>
      </form>
    </div>

    <div class="order-summary" id="order-summary">
      <h3>Order Summary</h3>
      <div id="checkout-items">
        <!-- Javascript dynamically injects cart items here -->
      </div>
      <div class="totals">
        <div class="totals-row">
          <span>Subtotal</span>
          <span id="subtotal">₹0.00</span>
        </div>
        <div class="totals-row">
          <span>Taxes</span>
          <span id="taxes">₹0.00</span>
        </div>
        <div class="totals-row final">
          <span>Total</span>
          <span id="total">₹0.00</span>
        </div>
      </div>
    </div>
  </div>

  <script src="frictionTracker.js?v=2"></script>
  <script src="global-tracker.js?v=2"></script>
  <script src="checkout-script.js?v=2"></script>

</body>
</html>
