<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friction Detection Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; }
  .header { background: #1a1d27; border-bottom: 1px solid #2d3748; padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 18px; font-weight: 600; color: #fff; }
  .header span { font-size: 12px; color: #64748b; }
  .live-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .container { padding: 24px 28px; max-width: 1400px; margin: 0 auto; }
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .kpi { background: #1a1d27; border: 1px solid #2d3748; border-radius: 10px; padding: 16px; }
  .kpi-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .kpi-val { font-size: 24px; font-weight: 700; color: #fff; }
  .green { color: #22c55e; }
  .blue { color: #3b82f6; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .charts-row2 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 20px; }
  .card { background: #1a1d27; border: 1px solid #2d3748; border-radius: 10px; padding: 18px; }
  .card-title { font-size: 13px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 14px; }
  .chart-wrap { position: relative; }
  .filters { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filters label { font-size: 12px; color: #64748b; }
  select { background: #0f1117; border: 1px solid #2d3748; color: #e2e8f0; border-radius: 6px; padding: 6px 10px; font-size: 12px; cursor: pointer; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid #2d3748; }
  td { padding: 9px 10px; border-bottom: 1px solid #1e2330; color: #cbd5e1; }
  tr:hover td { background: #1e2330; }
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-Low { background: #14532d; color: #86efac; }
  .badge-Medium { background: #78350f; color: #fcd34d; }
  .badge-High { background: #7f1d1d; color: #fca5a5; }
  .funnel-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .funnel-label { font-size: 12px; color: #94a3b8; width: 100px; text-align: right; }
  .funnel-bar-wrap { flex: 1; background: #0f1117; border-radius: 4px; height: 28px; overflow: hidden; }
  .funnel-bar { height: 28px; border-radius: 4px; display: flex; align-items: center; padding-left: 10px; font-size: 12px; font-weight: 600; color: #fff; transition: width 1s ease; }
  .funnel-pct { font-size: 12px; color: #64748b; width: 40px; }
  .loading { text-align: center; color: #64748b; padding: 40px; font-size: 13px; }
  .trend-filters { display: flex; gap: 8px; margin-bottom: 12px; }
  .trend-btn { background: #0f1117; border: 1px solid #2d3748; color: #64748b; border-radius: 6px; padding: 4px 12px; font-size: 11px; cursor: pointer; }
  .trend-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1><span class="live-dot"></span>Behavioral Analytics - Friction Dashboard</h1>
  </div>
  <span id="last-updated">Loading...</span>
</div>

<div class="container">
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">Total sessions</div><div class="kpi-val" id="kTotalSessions">-</div></div>
    <div class="kpi"><div class="kpi-label">Total users</div><div class="kpi-val" id="kTotalUsers">-</div></div>
    <div class="kpi"><div class="kpi-label">Conversion rate</div><div class="kpi-val green" id="kConversion">-</div></div>
    <div class="kpi"><div class="kpi-label">Avg session</div><div class="kpi-val blue" id="kAvgSession">-</div></div>
  </div>

  <div class="charts-row">
    <div class="card">
      <div class="card-title">Friction distribution</div>
      <div class="chart-wrap" style="height:200px"><canvas id="frictionChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Sessions by device</div>
      <div class="chart-wrap" style="height:200px"><canvas id="deviceChart"></canvas></div>
    </div>
  </div>

  <div class="charts-row2">
    <div class="card">
      <div class="card-title">Daily sessions by friction</div>
      <div class="trend-filters">
        <button class="trend-btn" onclick="changeTrend(30,this)">30 days</button>
        <button class="trend-btn" onclick="changeTrend(60,this)">60 days</button>
        <button class="trend-btn active" onclick="changeTrend(133,this)">All data</button>
      </div>
      <div class="chart-wrap" style="height:180px"><canvas id="trendChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Conversion funnel</div>
      <div id="funnelWrap" style="margin-top:8px"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Sessions</div>
    <div class="filters">
      <label>Friction</label>
      <select id="filterFriction" onchange="loadSessions()">
        <option value="all">All</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
      <label>Device</label>
      <select id="filterDevice" onchange="loadSessions()">
        <option value="all">All devices</option>
        <option value="web">Web</option>
        <option value="mobile">Mobile</option>
        <option value="desktop">Desktop</option>
        <option value="tablet">Tablet</option>
        <option value="unknown">Unknown</option>
      </select>
      <label>Limit</label>
      <select id="filterLimit" onchange="loadSessions()">
        <option value="25">25</option>
        <option value="50" selected>50</option>
        <option value="100">100</option>
      </select>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>Session ID</th>
            <th>User ID</th>
            <th>Device</th>
            <th>Browser</th>
            <th>Duration</th>
            <th>Events</th>
            <th>Revenue</th>
            <th>Friction</th>
            <th>Score</th>
          </tr>
        </thead>
        <tbody id="sessionTable"><tr><td colspan="9" class="loading">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API = "http://127.0.0.1:5000";
let frictionChart, deviceChart, trendChart;
let currentTrendDays = 133;

function fmt(n) { return Number(n).toLocaleString(); }
function fmtS(s) { return s >= 60 ? Math.round(s / 60) + "m " + (s % 60) + "s" : s + "s"; }

function changeTrend(days, btn) {
  currentTrendDays = days;
  document.querySelectorAll(".trend-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  loadTrend();
}

async function loadKPIs() {
  const d = await fetch(`${API}/api/kpis`).then(r => r.json());
  document.getElementById("kTotalSessions").textContent = fmt(d.total_sessions);
  document.getElementById("kTotalUsers").textContent = fmt(d.total_users);
  document.getElementById("kConversion").textContent = d.conversion_rate + "%";
  document.getElementById("kAvgSession").textContent = fmtS(Math.round(d.avg_session_duration));
  document.getElementById("last-updated").textContent = "Updated " + new Date().toLocaleTimeString();
}

async function loadFriction() {
  const d = await fetch(`${API}/api/friction/summary`).then(r => r.json());
  const order = ["Low", "Medium", "High"];
  const sorted = order.map(lvl => d.find(x => x.friction_level === lvl) || { friction_level: lvl, sessions: 0 });
  if (frictionChart) frictionChart.destroy();
  frictionChart = new Chart(document.getElementById("frictionChart"), {
    type: "doughnut",
    data: {
      labels: sorted.map(x => x.friction_level),
      datasets: [{
        data: sorted.map(x => x.sessions),
        backgroundColor: ["#22c55e", "#f59e0b", "#ef4444"],
        borderWidth: 0,
        hoverOffset: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: "65%",
      plugins: {
        legend: { position: "bottom", labels: { color: "#94a3b8", font: { size: 11 }, padding: 16 } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${fmt(ctx.parsed)} sessions` } }
      }
    }
  });
}

async function loadDevices() {
  const d = await fetch(`${API}/api/devices`).then(r => r.json());
  const devices = [...new Set(d.map(x => x.device_type))];
  const levels = ["Low", "Medium", "High"];
  const colors = { Low: "#22c55e", Medium: "#f59e0b", High: "#ef4444" };
  const datasets = levels.map(lvl => ({
    label: lvl,
    data: devices.map(dev => {
      const row = d.find(x => x.device_type === dev && x.friction_level === lvl);
      return row ? row.sessions : 0;
    }),
    backgroundColor: colors[lvl],
    borderRadius: 4,
  }));
  if (deviceChart) deviceChart.destroy();
  deviceChart = new Chart(document.getElementById("deviceChart"), {
    type: "bar",
    data: { labels: devices, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: "#94a3b8", font: { size: 11 } } } },
      scales: {
        x: { stacked: true, grid: { display: false }, ticks: { color: "#64748b" } },
        y: { stacked: true, grid: { color: "#1e2330" }, ticks: { color: "#64748b" } }
      }
    }
  });
}

async function loadTrend() {
  const d = await fetch(`${API}/api/trend?days=${currentTrendDays}`).then(r => r.json());
  const days = [...new Set(d.map(x => x.day))].sort();
  const levels = ["Low", "Medium", "High"];
  const colors = { Low: "#22c55e", Medium: "#f59e0b", High: "#ef4444" };
  const datasets = levels.map(lvl => ({
    label: lvl,
    data: days.map(day => {
      const row = d.find(x => x.day === day && x.friction_level === lvl);
      return row ? row.sessions : 0;
    }),
    backgroundColor: colors[lvl],
    borderRadius: 2,
  }));
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById("trendChart"), {
    type: "bar",
    data: { labels: days, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: "#94a3b8", font: { size: 11 } } } },
      scales: {
        x: {
          stacked: true,
          grid: { display: false },
          ticks: { color: "#64748b", font: { size: 9 }, maxRotation: 45, autoSkip: true, maxTicksLimit: 20 }
        },
        y: { stacked: true, grid: { color: "#1e2330" }, ticks: { color: "#64748b" } }
      }
    }
  });
}

async function loadFunnel() {
  const d = await fetch(`${API}/api/funnel`).then(r => r.json());
  const colors = ["#3b82f6", "#8b5cf6", "#f59e0b", "#22c55e"];
  document.getElementById("funnelWrap").innerHTML = d.map((s, i) => {
    return `<div class="funnel-row">
      <div class="funnel-label">${s.stage}</div>
      <div class="funnel-bar-wrap">
        <div class="funnel-bar" style="width:${s.pct}%;background:${colors[i]}">${fmt(s.count)}</div>
      </div>
      <div class="funnel-pct">${s.pct}%</div>
    </div>`;
  }).join("");
}

async function loadSessions() {
  const friction = document.getElementById("filterFriction").value;
  const device = document.getElementById("filterDevice").value;
  const limit = document.getElementById("filterLimit").value;
  const d = await fetch(`${API}/api/sessions?friction=${friction}&device=${device}&limit=${limit}`).then(r => r.json());
  const badgeClass = { Low: "badge-Low", Medium: "badge-Medium", High: "badge-High" };
  document.getElementById("sessionTable").innerHTML = d.length === 0
    ? `<tr><td colspan="9" class="loading">No sessions found</td></tr>`
    : d.map(s => `
    <tr>
      <td style="color:#60a5fa">#${s.session_id}</td>
      <td>${s.user_id}</td>
      <td>${s.device_type}</td>
      <td>${s.browser}</td>
      <td>${fmtS(s.session_duration)}</td>
      <td>${s.total_events}</td>
      <td style="color:#22c55e">${s.revenue > 0 ? "Rs " + Math.round(s.revenue) : "-"}</td>
      <td><span class="badge ${badgeClass[s.friction_level]}">${s.friction_level}</span></td>
      <td style="color:#94a3b8">${s.friction_score}</td>
    </tr>
  `).join("");
}

async function loadAll() {
  await Promise.all([
    loadKPIs(), loadFriction(), loadDevices(),
    loadTrend(), loadFunnel(), loadSessions()
  ]);
}

loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
